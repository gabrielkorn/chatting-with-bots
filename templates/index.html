<!DOCTYPE html>
<html>
<head>
  <title>RobotChat</title>
  <style>
    body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
    #bot-panel { width: 180px; border-left: 1px solid #ccc; display: flex; flex-direction: column; overflow-y: auto; }
    #bot-panel .panel-title { padding: 8px 10px; font-size: 12px; font-weight: bold; color: #666; border-bottom: 1px solid #eee; }
    #bot-panel label { display: flex; align-items: center; gap: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
    #bot-panel label:hover { background: #f5f5f5; }
    #sidebar { width: 220px; border-right: 1px solid #ccc; display: flex; flex-direction: column; padding: 10px; gap: 6px; overflow-y: auto; }
    #sidebar a { text-decoration: none; color: inherit; padding: 6px 8px; border-radius: 4px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #sidebar a.active, #sidebar a:hover { background: #eee; }
    #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-window { flex: 1; overflow-y: auto; padding: 12px; }
    .message.user { text-align: right; margin: 6px 0; }
    .message.bot { text-align: left; margin: 6px 0; }
    #send-form { display: flex; padding: 10px; gap: 8px; border-top: 1px solid #ccc; }
    #send-form input[type=text] { flex: 1; padding: 6px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <form method="POST" action="/conversations/new">
      <button type="submit" style="width:100%">+ New Chat</button>
    </form>
    {% for conv in conversations %}
      <a href="/convo/{{ conv.id }}" {% if conv.id == active_id %}class="active"{% endif %}>{{ conv.name }}</a>
    {% endfor %}
  </div>
  <div id="chat-area">
    <div id="chat-window">
      {% for msg in messages %}
        <div class="message {{ msg.sender }}"><strong>{{ msg.sender }}:</strong> {{ msg.content }}</div>
      {% endfor %}
    </div>
    {% if active_id %}
    <form id="send-form" hx-post="/message/send" hx-target="#chat-window" hx-swap="beforeend" hx-on::after-request="this.reset()">
      <input type="hidden" name="conversation_id" value="{{ active_id }}" />
      <input type="text" name="message" autocomplete="off" />
      <button type="submit">Send</button>
    </form>
    {% endif %}
  </div>
  {% if all_bots %}
  <div id="bot-panel">
    <div class="panel-title">Bots active in the chat</div>
    {% for bot in all_bots %}
    <label>
      {% if active_id %}
      <input type="checkbox"
             {% if bot.id in active_bot_ids %}checked{% endif %}
             hx-post="/convo/{{ active_id }}/bots/{{ bot.id }}/toggle"
             hx-trigger="change"
             hx-swap="none" />
      {% else %}
      <input type="checkbox" disabled />
      {% endif %}
      {{ bot.name }}
    </label>
    {% endfor %}
    <a href="/bots" style="margin-top: auto; display: block; padding: 8px 10px; font-size: 13px; color: #666; text-decoration: none; border-top: 1px solid #eee;">Manage Bots</a>
  </div>
  {% endif %}
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
